<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="100%" height="120">
  <style>
    /* On importe la police de ton portfolio */
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;display=swap');
    
    .text {
      font-family: 'Instrument Serif', serif;
      font-size: 54px;
      fill: #ffffff;
    }
    
    .mask-rect {
      /* 1.8s d'animation, 17 lettres, 1 SEULE FOIS, "forwards" fige le texte à la fin */
      animation: typing 1.8s steps(17) 1 forwards;
      animation-delay: 0.3s;
    }
    
    @keyframes typing {
      0% { width: 0; }
      100% { width: 450px; } /* Largeur suffisante pour dévoiler tout le nom */
    }
  </style>

  <!-- Masque invisible qui s'élargit pour simuler la frappe -->
  <clipPath id="mask">
    <rect class="mask-rect" x="180" y="0" width="0" height="120" />
  </clipPath>

  <!-- Ton nom, révélé par le masque -->
  <text class="text" x="185" y="75" clip-path="url(#mask)">Mohamed Boughmadi</text>
</svg>
